name: Chance Sensor Weekly Report

on:
  schedule:
    # 매주 월요일 오전 10시 KST = UTC 01:00 Monday
    - cron: '0 1 * * 1'
  workflow_dispatch: # 수동 실행 가능

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Chance Sensor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: python main.py

      - name: Commit watchlist updates
        run: |
          git config user.name "chance-sensor-bot"
          git config user.email "bot@risingwings.com"
          git add watchlist.json .issue_number
          git diff --cached --quiet || git commit -m "chore: update watchlist $(date +%Y-%m-%d)"
          git push
